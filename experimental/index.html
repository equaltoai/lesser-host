<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deterministic Lesser Souls Explorer</title>
    <style>
      :root {
        --bg-color: #0d1117;
        --text-color: #c9d1d9;
        --accent: #58a6ff;
        --accent-hover: #79c0ff;
        --card-bg: #161b22;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        margin-top: 0;
        text-align: center;
      }
      .controls {
        background-color: var(--card-bg);
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #30363d;
        margin-bottom: 30px;
        display: flex;
        gap: 10px;
        align-items: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      input {
        padding: 8px 12px;
        background-color: #0d1117;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 6px;
        font-size: 16px;
        width: 250px;
      }
      button {
        padding: 8px 16px;
        background-color: #238636;
        color: #ffffff;
        border: 1px solid rgba(240, 246, 252, 0.1);
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background-color: #2ea043;
      }
      .concept-section {
        width: 100%;
        max-width: 1000px;
        margin-bottom: 40px;
      }
      .concept-title {
        border-bottom: 1px solid #30363d;
        padding-bottom: 10px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .concept-title p {
        margin: 0;
        font-size: 0.9em;
        color: #8b949e;
      }
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
      }
      .token-card {
        background-color: var(--card-bg);
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: transform 0.2s;
      }
      .token-card:hover {
        transform: translateY(-5px);
        border-color: #8b949e;
      }
      .token-image {
        width: 200px;
        height: 200px;
        background-color: #000;
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .token-image svg {
        width: 100%;
        height: 100%;
      }
      .token-info {
        margin-top: 15px;
        text-align: center;
        width: 100%;
      }
      .token-seed {
        font-family: monospace;
        background-color: rgba(110, 118, 129, 0.4);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.85em;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>Lesser Souls - Generative NFT Concepts</h1>

    <div class="controls">
      <label for="custom-seed">Base Seed:</label>
      <input type="text" id="custom-seed" value="genesis-soul-00" />
      <button id="btn-generate">Generate Explorations</button>
      <button id="btn-random">Random</button>
    </div>

    <div id="container"></div>

    <script>
      // --- Pseudo-Random Number Generator Setup ---
      // A simple hash function to turn string into an initial numeric seed state
      function xmur3(str) {
        for (var i = 0, h = 1779033703 ^ str.length; i < str.length; i++) {
          h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
          h = (h << 13) | (h >>> 19);
        }
        return function () {
          h = Math.imul(h ^ (h >>> 16), 2246822507);
          h = Math.imul(h ^ (h >>> 13), 3266489909);
          return (h ^= h >>> 16) >>> 0;
        };
      }
      // Mulberry32 generator for fast float PRNG [0, 1) based on a 32-bit state
      function mulberry32(a) {
        return function () {
          var t = (a += 0x6d2b79f5);
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      let R = null;
      function seedRNG(seedStr) {
        const seed = xmur3(seedStr)();
        R = mulberry32(seed);
        return R;
      }
      function randomRange(min, max) {
        return min + R() * (max - min);
      }
      function randomInt(min, max) {
        return Math.floor(randomRange(min, max));
      }
      function randomChoice(arr) {
        return arr[randomInt(0, arr.length)];
      }

      // --- CONCEPT 1: Ethereal Blob (On-Chain Native) ---
      // This is highly optimal for ERC-721 fully on-chain rendering because its file size is miniscule.
      // It relies on SVG feTurbulence which has a native "seed" attribute!
      function generateEtherealBlob(seedStr, numericSeed) {
        seedRNG(seedStr);
        const hue = randomInt(0, 360);
        const hue2 = (hue + randomChoice([60, 120, 180])) % 360;
        const bgLightness = randomInt(5, 15);
        const blobSize = randomRange(50, 80);
        const freqX = randomRange(0.01, 0.05).toFixed(3);
        const freqY = randomRange(0.01, 0.05).toFixed(3);
        const scale = randomInt(20, 100);

        return `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                    <defs>
                        <linearGradient id="bg-${numericSeed}" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="hsl(${hue}, 80%, ${bgLightness}%)" />
                            <stop offset="100%" stop-color="#000" />
                        </linearGradient>
                        <radialGradient id="glow-${numericSeed}" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="hsl(${hue}, 100%, 70%)" stop-opacity="0.8" />
                            <stop offset="70%" stop-color="hsl(${hue2}, 100%, 50%)" stop-opacity="0.3" />
                            <stop offset="100%" stop-color="hsl(${hue}, 100%, 20%)" stop-opacity="0" />
                        </radialGradient>
                        <filter id="displacementFilter-${numericSeed}">
                            <!-- Uses the numeric seed hash to drive the noise! -->
                            <feTurbulence type="fractalNoise" baseFrequency="${freqX} ${freqY}" numOctaves="3" result="noise" seed="${numericSeed}"/>
                            <feDisplacementMap in="SourceGraphic" in2="noise" scale="${scale}" xChannelSelector="R" yChannelSelector="G"/>
                        </filter>
                    </defs>
                    <rect width="200" height="200" fill="url(#bg-${numericSeed})" />
                    <circle cx="100" cy="100" r="${blobSize}" fill="url(#glow-${numericSeed})" filter="url(#displacementFilter-${numericSeed})" />
                    <!-- Core distinctiveness -->
                    <circle cx="100" cy="100" r="${blobSize * 0.3}" fill="#fff" opacity="0.6" filter="blur(8px)" />
                </svg>
            `;
      }

      // --- CONCEPT 2: Sacred Geometry (Golden Ratio) ---
      // Uses polar coordinates, symmetric drawing, and Phi (1.618...).
      function generateSacredGeometry(seedStr) {
        seedRNG(seedStr);
        let svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" style="background-color: #0d1117">`;
        svgStr += `<g transform="translate(100, 100)">`;

        const PHI = 1.61803398875;
        const layers = randomInt(4, 9);
        const baseHue = randomInt(0, 360);
        
        // Fibonacci numbers for points
        const fibPoints = [3, 5, 8, 13, 21];

        for (let i = 0; i < layers; i++) {
          const radius = 95 / Math.pow(PHI, i);
          const points = randomChoice(fibPoints);
          const hue = (baseHue + i * 137.5) % 360; // Golden angle (~137.5 deg) color shift
          const stroke = `hsl(${hue}, 80%, 60%)`;
          const fill = randomR() > 0.5 ? "none" : `hsl(${hue}, 60%, 20%)`;
          const lineWidth = randomRange(0.5, 2.5);
          
          // Rotation related to golden angle as well
          const rotationOffset = (i * 137.5 + randomRange(0, 30)) % 360;

          let pathStr = "";
          const shapeType = randomChoice(["polygon", "circles", "lines"]);
          
          for (let j = 0; j < points; j++) {
            const angle =
              (j / points) * Math.PI * 2 + (rotationOffset * Math.PI) / 180;

            if (shapeType === "polygon") {
              const px = Math.cos(angle) * radius;
              const py = Math.sin(angle) * radius;
              pathStr += (j === 0 ? "M" : "L") + ` ${px} ${py} `;
            } else if (shapeType === "circles") {
              const rCenter = radius / PHI;
              const px = Math.cos(angle) * rCenter;
              const py = Math.sin(angle) * rCenter;
              const cr = radius - rCenter;
              svgStr += `<circle cx="${px}" cy="${py}" r="${cr}" stroke="${stroke}" fill="none" stroke-width="${lineWidth}" />`;
            } else {
              const px = Math.cos(angle) * radius;
              const py = Math.sin(angle) * radius;
              const rIn = radius / PHI;
              const pxIn = Math.cos(angle) * rIn;
              const pyIn = Math.sin(angle) * rIn;
              svgStr += `<line x1="${pxIn}" y1="${pyIn}" x2="${px}" y2="${py}" stroke="${stroke}" stroke-width="${lineWidth}" />`;
            }
          }

          if (pathStr.length > 0) {
            pathStr += "Z";
            svgStr += `<path d="${pathStr}" stroke="${stroke}" fill="${fill}" stroke-width="${lineWidth}" opacity="0.8" />`;
          }
        }

        svgStr += `<circle cx="0" cy="0" r="${randomRange(2, 6)}" fill="hsl(${baseHue}, 100%, 80%)" />`;
        svgStr += `</g></svg>`;
        return svgStr;
      }

      // Helper alias
      function randomR() {
        return R();
      }

      // --- CONCEPT 3: The Rune / Sigil ---
      // Generates a symmetrical grid of points and connects them, filling cells randomly.
      function generateSigil(seedStr) {
        seedRNG(seedStr);
        const gridSz = randomChoice([4, 5, 6, 7]);
        const boxSz = 140;
        const cellSz = boxSz / gridSz;
        const margin = (200 - boxSz) / 2;

        const hue = randomInt(0, 360);
        const isDark = randomR() > 0.5;
        const bg = isDark ? "#111" : "#eee";
        const fg = isDark ? `hsl(${hue}, 80%, 65%)` : `hsl(${hue}, 80%, 35%)`;

        let svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" style="background-color: ${bg}">`;
        svgStr += `<g fill="${fg}">`;

        const numCols = Math.ceil(gridSz / 2);
        for (let y = 0; y < gridSz; y++) {
          for (let x = 0; x < numCols; x++) {
            if (randomR() > 0.4) {
              const cx = margin + x * cellSz;
              const cy = margin + y * cellSz;
              svgStr += `<rect x="${cx}" y="${cy}" width="${cellSz + 0.5}" height="${cellSz + 0.5}" />`;

              // Mirrored side
              const mx = gridSz - 1 - x;
              if (mx !== x) {
                const mcx = margin + mx * cellSz;
                svgStr += `<rect x="${mcx}" y="${cy}" width="${cellSz + 0.5}" height="${cellSz + 0.5}" />`;
              }
            }
          }
        }
        svgStr += `</g>`;

        // Decorate with frame
        if (randomR() > 0.5) {
          svgStr += `<rect x="${margin - 10}" y="${margin - 10}" width="${boxSz + 20}" height="${boxSz + 20}" fill="none" stroke="${fg}" stroke-width="2" />`;
        }
        if (randomR() > 0.7) {
          svgStr += `<circle cx="100" cy="100" r="${boxSz * 0.75}" fill="none" stroke="${fg}" stroke-width="1.5" stroke-dasharray="5,5" />`;
        }

        svgStr += `</svg>`;
        return svgStr;
      }

      const concepts = [
        {
          id: "concept1",
          title: "Concept #1 - Ethereal Blob (Native SVG Filters)",
          desc: "Highly efficient for fully on-chain storage. Uses native feTurbulence & feDisplacement mapped natively by a numeric seed.",
          generator: generateEtherealBlob,
        },
        {
          id: "concept2",
          title: "Concept #2 - Sacred Geometry (Golden Ratio)",
          desc: "Generative art built on nature's math. Uses Phi (1.618) and Fibonacci numbers for scale, points, colors, and golden rotations.",
          generator: generateSacredGeometry,
        },
        {
          id: "concept3",
          title: "Concept #3 - The Sigil (Symmetric Grids)",
          desc: 'Creates a unique identifier symbol or "rune". Minimalistic, bold, excellent for small avatars.',
          generator: generateSigil,
        },
      ];

      function renderGallery() {
        const container = document.getElementById("container");
        container.innerHTML = "";

        const baseSeed = document.getElementById("custom-seed").value;

        concepts.forEach((concept) => {
          const section = document.createElement("div");
          section.className = "concept-section";

          const title = document.createElement("div");
          title.className = "concept-title";
          title.innerHTML = `<h2>${concept.title}</h2><p>${concept.desc}</p>`;
          section.appendChild(title);

          const gallery = document.createElement("div");
          gallery.className = "gallery";

          // Generate 4 examples per concept: Base Seed + 3 variations
          const seedsToTest = [
            baseSeed,
            baseSeed + "-alpha",
            baseSeed + "-beta",
            baseSeed + "-gamma",
          ];

          seedsToTest.forEach((seed) => {
            const card = document.createElement("div");
            card.className = "token-card";

            const imgContainer = document.createElement("div");
            imgContainer.className = "token-image";

            // The numeric hash of the seed used for feTurbulence
            const numericHash = xmur3(seed)();
            const svgData = concept.generator(seed, numericHash);
            imgContainer.innerHTML = svgData;

            const info = document.createElement("div");
            info.className = "token-info";
            info.innerHTML = `Seed: <span class="token-seed">${seed}</span>`;

            card.appendChild(imgContainer);
            card.appendChild(info);
            gallery.appendChild(card);
          });

          section.appendChild(gallery);
          container.appendChild(section);
        });
      }

      document
        .getElementById("btn-generate")
        .addEventListener("click", renderGallery);
      document.getElementById("btn-random").addEventListener("click", () => {
        document.getElementById("custom-seed").value =
          "soul-" + Math.floor(Math.random() * 999999).toString(16);
        renderGallery();
      });

      // initial render
      renderGallery();
    </script>
  </body>
</html>
