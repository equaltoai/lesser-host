version: "2"

run:
  tests: true

linters:
  enable:
    - bodyclose
    - dupl
    - gocognit
    - goconst
    - gocyclo
    - gosec
    - misspell
    - revive
  disable:
    - exhaustive
    - exhaustruct
    - funlen
    - godot
    - godox
    - lll
    - nlreturn
    - varnamelen
    - wsl

  settings:
    dupl:
      threshold: 150
    errcheck:
      check-type-assertions: true
      check-blank: false
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 3
      min-occurrences: 3
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G104 # Unhandled errors (use errcheck instead)
        - G101 # Hardcoded credentials (too many false positives)
    govet:
      enable:
        - shadow
      settings:
        shadow:
          strict: false
    misspell:
      locale: US
    staticcheck:
      checks:
        - all
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
          severity: warning
          disabled: false
        - name: var-naming
          severity: warning
          disabled: false
        - name: package-comments
          severity: warning
          disabled: true
        - name: comment-spacings
          severity: warning
          disabled: true
        - name: line-length-limit
          severity: warning
          disabled: true
        - name: function-result-limit
          severity: warning
          disabled: true
        - name: max-public-structs
          severity: warning
          disabled: true
        - name: cognitive-complexity
          severity: warning
          disabled: true
        - name: cyclomatic
          severity: warning
          disabled: true
        - name: confusing-naming
          severity: warning
          disabled: true
        - name: add-constant
          severity: warning
          disabled: true

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        text: 'Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*print(f|ln)?|os\.(Un)?Setenv). is not checked'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
    
severity:
  default: warning
