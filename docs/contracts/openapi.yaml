openapi: 3.1.0
info:
  title: lesser-host REST API (contracts)
  version: 0.1.0
  description: |
    Contract snapshot for build-time client generation. This file is not served at runtime.

components:
  securitySchemes:
    sessionAuth:
      type: http
      scheme: bearer
      description: "Control plane session token: `Authorization: Bearer <session_token>`."
    instanceKeyAuth:
      type: http
      scheme: bearer
      description: "Instance API key: `Authorization: Bearer <instance_key>`."

  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
              minLength: 1
              maxLength: 128
            message:
              type: string
              minLength: 1
              maxLength: 2048
            request_id:
              type: string
              minLength: 1
              maxLength: 128

    SoulAgentChannelsResponse:
      type: object
      additionalProperties: false
      required: [agentId, channels, contactPreferences, updatedAt]
      properties:
        agentId:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        channels:
          type: object
          additionalProperties: false
          required: [ens, email, phone]
          properties:
            ens:
              type: [object, "null"]
              additionalProperties: false
              required: [name]
              properties:
                name:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9_.-]*\\.eth$"
                resolverAddress:
                  type: string
                  pattern: "^0x[0-9a-fA-F]{40}$"
                chain:
                  type: string
                  default: mainnet
            email:
              type: [object, "null"]
              additionalProperties: false
              required: [address, capabilities, verified]
              properties:
                address:
                  type: string
                  format: email
                capabilities:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [receive, send]
                protocols:
                  type: array
                  items:
                    type: string
                    enum: [smtp, imap]
                verified:
                  type: boolean
                verifiedAt:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [active, paused, decommissioned]
            phone:
              type: [object, "null"]
              additionalProperties: false
              required: [number, capabilities, verified]
              properties:
                number:
                  type: string
                  pattern: "^\\+[1-9]\\d{1,14}$"
                capabilities:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [sms-receive, sms-send, voice-receive, voice-send]
                provider:
                  type: string
                verified:
                  type: boolean
                verifiedAt:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [active, paused, decommissioned]
        contactPreferences:
          type: [object, "null"]
          additionalProperties: false
          required: [preferred, availability, responseExpectation, languages]
          properties:
            preferred:
              type: string
              enum: [email, sms, voice, activitypub, mcp]
            fallback:
              type: string
              enum: [email, sms, voice, activitypub, mcp]
            availability:
              type: object
              additionalProperties: false
              required: [schedule]
              properties:
                schedule:
                  type: string
                  enum: [always, business-hours, custom]
                timezone:
                  type: string
                windows:
                  type: [array, "null"]
                  items:
                    type: object
                    additionalProperties: false
                    required: [days, startTime, endTime]
                    properties:
                      days:
                        type: array
                        minItems: 1
                        items:
                          type: string
                          enum: [mon, tue, wed, thu, fri, sat, sun]
                      startTime:
                        type: string
                        pattern: "^[0-2][0-9]:[0-5][0-9]$"
                      endTime:
                        type: string
                        pattern: "^[0-2][0-9]:[0-5][0-9]$"
            responseExpectation:
              type: object
              additionalProperties: false
              required: [target, guarantee]
              properties:
                target:
                  type: string
                guarantee:
                  type: string
                  enum: [guaranteed, best-effort]
            rateLimits:
              type: object
              additionalProperties: false
              properties:
                email:
                  type: object
                  additionalProperties: false
                  properties:
                    maxInboundPerHour:
                      type: integer
                      minimum: 1
                    maxInboundPerDay:
                      type: integer
                      minimum: 1
                sms:
                  type: object
                  additionalProperties: false
                  properties:
                    maxInboundPerHour:
                      type: integer
                      minimum: 1
                    maxInboundPerDay:
                      type: integer
                      minimum: 1
                voice:
                  type: object
                  additionalProperties: false
                  properties:
                    maxConcurrentCalls:
                      type: integer
                      minimum: 1
                    maxCallsPerDay:
                      type: integer
                      minimum: 1
            languages:
              type: array
              minItems: 1
              items:
                type: string
                pattern: "^[a-z]{2}$"
            contentTypes:
              type: array
              items:
                type: string
            firstContact:
              type: object
              additionalProperties: false
              properties:
                requireSoul:
                  type: boolean
                  default: false
                requireReputation:
                  type: [number, "null"]
                  minimum: 0
                  maximum: 1
                introductionExpected:
                  type: boolean
                  default: false
        updatedAt:
          type: string
          format: date-time

    SoulAgentChannelPreferencesResponse:
      $ref: "../spec/v3/schemas/soul-agent-channel-preferences.response.schema.json"

    SoulAgentChannelPreferencesRequest:
      $ref: "../spec/v3/schemas/soul-agent-channel-preferences.request.schema.json"

    SoulAgentIdentity:
      $ref: "../spec/v3/schemas/soul-agent-identity.schema.json"

    SoulResolveResponse:
      type: object
      additionalProperties: false
      required: [version, agent]
      properties:
        version:
          type: string
          enum: ["1"]
        agent:
          $ref: "#/components/schemas/SoulAgentIdentity"

    SoulSearchResult:
      $ref: "../spec/v3/schemas/soul-search.result.schema.json"

    SoulSearchResponse:
      $ref: "../spec/v3/schemas/soul-search.response.schema.json"

    SoulCommSendRequest:
      $ref: "../spec/v3/schemas/soul-comm-send.request.schema.json"

    SoulCommSendResponse:
      $ref: "../spec/v3/schemas/soul-comm-send.response.schema.json"

    SoulCommSendErrorEnvelope:
      $ref: "../spec/v3/schemas/soul-comm-send.error.schema.json"

    SoulCommStatusResponse:
      $ref: "../spec/v3/schemas/soul-comm-status.response.schema.json"

    SoulCommStatusErrorEnvelope:
      $ref: "../spec/v3/schemas/soul-comm-status.error.schema.json"

    SoulAgentCommActivityItem:
      $ref: "../spec/v3/schemas/soul-agent-comm-activity-item.schema.json"

    SoulAgentCommActivityResponse:
      $ref: "../spec/v3/schemas/soul-agent-comm-activity.response.schema.json"

    SoulAgentCommQueueItem:
      $ref: "../spec/v3/schemas/soul-agent-comm-queue-item.schema.json"

    SoulAgentCommQueueResponse:
      $ref: "../spec/v3/schemas/soul-agent-comm-queue.response.schema.json"

    SafeTxPayload:
      type: object
      additionalProperties: false
      required: [safe_address, to, value, data]
      properties:
        safe_address:
          type: string
        to:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        value:
          type: string
        data:
          type: string
          pattern: "^0x[0-9a-fA-F]*$"

    SoulOperation:
      type: object
      additionalProperties: false
      required: [operation_id, kind, status, created_at, updated_at]
      properties:
        operation_id:
          type: string
        kind:
          type: string
        agent_id:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        status:
          type: string
          enum: [pending, proposed, executed, failed]
        safe_payload:
          type: string
        exec_tx_hash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        exec_block_number:
          type: integer
        exec_success:
          type: boolean
        receipt_json:
          type: string
        snapshot_json:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        executed_at:
          type: string
          format: date-time

    WalletChallengeResponse:
      type: object
      additionalProperties: false
      required: [id, address, chainId, nonce, message, issuedAt, expiresAt]
      properties:
        id:
          type: string
        username:
          type: string
        address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        chainId:
          type: integer
        nonce:
          type: string
        message:
          type: string
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    SoulRegistryProofInstructions:
      type: object
      additionalProperties: false
      required: [method]
      properties:
        method:
          type: string
          enum: [dns_txt, https_well_known]
        dns_name:
          type: string
        dns_value:
          type: string
        https_url:
          type: string
          format: uri
        https_body:
          type: string

    SoulAgentRegistration:
      type: object
      additionalProperties: false
      required: [id, domain_normalized, local_id, agent_id, wallet_address, status, created_at, updated_at]
      properties:
        id:
          type: string
        username:
          type: string
        domain_raw:
          type: string
        domain_normalized:
          type: string
        local_id_raw:
          type: string
        local_id:
          type: string
        agent_id:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        wallet_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        capabilities:
          type: array
          items:
            type: string
        wallet_nonce:
          type: string
        wallet_message:
          type: string
        proof_token:
          type: string
        dns_verified:
          type: boolean
        https_verified:
          type: boolean
        wallet_verified:
          type: boolean
        verified_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, completed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    SoulAgentPromotionPrerequisites:
      type: object
      additionalProperties: false
      required:
        - principal_declaration_recorded
        - mint_operation_created
        - mint_executed
        - conversation_started
        - conversation_completed
        - review_draft_ready
        - ready_for_finalize
        - graduated
      properties:
        principal_declaration_recorded:
          type: boolean
        mint_operation_created:
          type: boolean
        mint_executed:
          type: boolean
        conversation_started:
          type: boolean
        conversation_completed:
          type: boolean
        review_draft_ready:
          type: boolean
        ready_for_finalize:
          type: boolean
        graduated:
          type: boolean

    SoulAgentPromotion:
      type: object
      additionalProperties: false
      required:
        - agent_id
        - domain
        - local_id
        - wallet
        - stage
        - request_status
        - review_status
        - approval_status
        - readiness_status
        - created_at
        - updated_at
        - prerequisites
      properties:
        agent_id:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        registration_id:
          type: string
        requested_by:
          type: string
        domain:
          type: string
        local_id:
          type: string
        wallet:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        stage:
          type: string
          enum: [requested, approved, minted, reviewing, ready_to_finalize, graduated]
        request_status:
          type: string
          enum: [requested, verified, minted, graduated]
        review_status:
          type: string
          enum: [not_started, conversation_in_progress, draft_ready, published]
        approval_status:
          type: string
          enum: [pending, approved]
        readiness_status:
          type: string
          enum: [awaiting_verification, awaiting_mint, ready_for_conversation, ready_for_finalize, graduated]
        mint_operation_id:
          type: string
        mint_operation_status:
          type: string
          enum: [pending, proposed, executed, failed]
        principal_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        latest_conversation_id:
          type: string
        latest_conversation_status:
          type: string
          enum: [in_progress, completed, failed]
        latest_review_sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        latest_boundary_count:
          type: integer
          minimum: 0
        latest_capability_count:
          type: integer
          minimum: 0
        published_version:
          type: integer
          minimum: 0
        requested_at:
          type: string
          format: date-time
        verified_at:
          type: string
          format: date-time
        approved_at:
          type: string
          format: date-time
        minted_at:
          type: string
          format: date-time
        review_started_at:
          type: string
          format: date-time
        review_ready_at:
          type: string
          format: date-time
        graduated_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        prerequisites:
          $ref: "#/components/schemas/SoulAgentPromotionPrerequisites"
        next_actions:
          type: array
          items:
            type: string
            enum:
              - verify_request
              - record_mint_execution
              - start_review_conversation
              - complete_review_conversation
              - begin_finalize

    SoulAgentPromotionResponse:
      type: object
      additionalProperties: false
      required: [version, promotion]
      properties:
        version:
          type: string
          enum: ["1"]
        promotion:
          $ref: "#/components/schemas/SoulAgentPromotion"

    SoulAgentPromotionListResponse:
      type: object
      additionalProperties: false
      required: [version, promotions, count, has_more]
      properties:
        version:
          type: string
          enum: ["1"]
        promotions:
          type: array
          items:
            $ref: "#/components/schemas/SoulAgentPromotion"
        count:
          type: integer
          minimum: 0
        has_more:
          type: boolean
        next_cursor:
          type: string

    SoulAgentPromotionLifecycleEvent:
      type: object
      additionalProperties: false
      required: [event_id, event_type, occurred_at, promotion]
      properties:
        event_id:
          type: string
        event_type:
          type: string
          enum:
            - request_created
            - request_approved
            - mint_executed
            - review_started
            - finalize_ready
            - graduated
        summary:
          type: string
        occurred_at:
          type: string
          format: date-time
        request_id:
          type: string
        operation_id:
          type: string
        conversation_id:
          type: string
        promotion:
          $ref: "#/components/schemas/SoulAgentPromotion"

    SoulAgentPromotionLifecycleEventListResponse:
      type: object
      additionalProperties: false
      required: [version, events, count, has_more]
      properties:
        version:
          type: string
          enum: ["1"]
        events:
          type: array
          items:
            $ref: "#/components/schemas/SoulAgentPromotionLifecycleEvent"
        count:
          type: integer
          minimum: 0
        has_more:
          type: boolean
        next_cursor:
          type: string

    SoulAgentRegistrationBeginRequest:
      type: object
      additionalProperties: false
      required: [domain, local_id, wallet_address]
      properties:
        domain:
          type: string
        local_id:
          type: string
        wallet_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        capabilities:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true

    SoulAgentRegistrationBeginResponse:
      type: object
      additionalProperties: false
      required: [registration, wallet, proofs]
      properties:
        registration:
          $ref: "#/components/schemas/SoulAgentRegistration"
        wallet:
          $ref: "#/components/schemas/WalletChallengeResponse"
        proofs:
          type: array
          items:
            $ref: "#/components/schemas/SoulRegistryProofInstructions"
        promotion:
          $ref: "#/components/schemas/SoulAgentPromotion"

    SoulAgentRegistrationVerifyRequest:
      type: object
      additionalProperties: false
      required:
        - signature
        - principal_address
        - principal_declaration
        - principal_signature
        - declared_at
      properties:
        signature:
          type: string
        principal_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        principal_declaration:
          type: string
        principal_signature:
          type: string
        declared_at:
          type: string
          format: date-time

    SoulAgentRegistrationVerifyResponse:
      type: object
      additionalProperties: false
      required: [registration, operation]
      properties:
        registration:
          $ref: "#/components/schemas/SoulAgentRegistration"
        operation:
          $ref: "#/components/schemas/SoulOperation"
        safe_tx:
          $ref: "#/components/schemas/SafeTxPayload"
        promotion:
          $ref: "#/components/schemas/SoulAgentPromotion"

    AIUsage:
      type: object
      additionalProperties: false
      properties:
        provider:
          type: string
        model:
          type: string
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
        duration_ms:
          type: integer
          minimum: 0
        tool_calls:
          type: integer
          minimum: 0

    SoulMintConversationSSEInput:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        model:
          type: string
          minLength: 1
        conversation_id:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1

    SoulMintConversation:
      type: object
      additionalProperties: false
      required:
        - agent_id
        - conversation_id
        - model
        - status
        - created_at
      properties:
        agent_id:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        conversation_id:
          type: string
        model:
          type: string
        messages:
          type: string
        produced_declarations:
          type: string
        status:
          type: string
          enum: [in_progress, completed, failed]
        usage:
          $ref: "#/components/schemas/AIUsage"
        charged_credits:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    SoulMintConversationCompleteRequest:
      type: object
      additionalProperties: false
      properties:
        declarations:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/SoulMintConversationDeclarationPreview"

    SoulAgentMintConversationsResponse:
      type: object
      additionalProperties: false
      required: [version, conversations, count]
      properties:
        version:
          type: string
          enum: ["1"]
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/SoulMintConversation"
        count:
          type: integer
          minimum: 0

    SoulMintConversationFinalizeBeginRequest:
      type: object
      additionalProperties: false
      required: [boundary_signatures]
      properties:
        boundary_signatures:
          type: object
          additionalProperties:
            type: string

    SoulMintConversationDeclarationPreview:
      type: object
      additionalProperties: false
      required: [selfDescription, capabilities, boundaries, transparency]
      properties:
        selfDescription:
          type: object
          additionalProperties: true
        capabilities:
          type: array
          items:
            type: object
            additionalProperties: true
        boundaries:
          type: array
          items:
            type: object
            additionalProperties: true
        transparency:
          type: object
          additionalProperties: true

    SoulMintConversationFinalizeBoundaryRequirement:
      type: object
      additionalProperties: false
      required:
        - boundary_id
        - category
        - statement
        - signer_wallet
        - signing_method
        - message_encoding
        - message
        - digest_hex
      properties:
        boundary_id:
          type: string
        category:
          type: string
        statement:
          type: string
        rationale:
          type: string
        supersedes:
          type: string
        signature_hex:
          type: string
        signer_wallet:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        signing_method:
          type: string
          enum: [eip191_personal_sign]
        message_encoding:
          type: string
          enum: [utf8]
        message:
          type: string
        digest_hex:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"

    SoulMintConversationFinalizeSigningInput:
      type: object
      additionalProperties: false
      required:
        - signer_wallet
        - signing_method
        - message_encoding
        - message_hex
        - digest_hex
        - canonical_json
      properties:
        signer_wallet:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        signing_method:
          type: string
          enum: [eip191_personal_sign]
        message_encoding:
          type: string
          enum: [hex_bytes]
        message_hex:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        digest_hex:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        canonical_json:
          type: string

    SoulMintConversationFinalizeRequestTemplate:
      type: object
      additionalProperties: false
      required: [boundary_signatures, issued_at, expected_version, self_attestation]
      properties:
        boundary_signatures:
          type: object
          additionalProperties:
            type: string
        issued_at:
          type: string
          format: date-time
        expected_version:
          type: integer
          minimum: 0
        self_attestation:
          type: string

    SoulMintConversationFinalizeRequest:
      type: object
      additionalProperties: false
      required: [boundary_signatures, issued_at, expected_version, self_attestation]
      properties:
        boundary_signatures:
          type: object
          additionalProperties:
            type: string
        issued_at:
          type: string
          format: date-time
        expected_version:
          type: integer
          minimum: 0
        self_attestation:
          type: string

    SoulMintConversationFinalizePreflightResponse:
      type: object
      additionalProperties: false
      required:
        - version
        - digest_hex
        - issued_at
        - expected_version
        - next_version
        - declarations_preview
        - boundary_requirements
        - self_attestation_signing
        - finalize_request_template
      properties:
        version:
          type: string
          enum: ["1"]
        digest_hex:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        issued_at:
          type: string
          format: date-time
        expected_version:
          type: integer
          minimum: 0
        next_version:
          type: integer
          minimum: 1
        declarations_preview:
          $ref: "#/components/schemas/SoulMintConversationDeclarationPreview"
        boundary_requirements:
          type: array
          items:
            $ref: "#/components/schemas/SoulMintConversationFinalizeBoundaryRequirement"
        self_attestation_signing:
          $ref: "#/components/schemas/SoulMintConversationFinalizeSigningInput"
        finalize_request_template:
          $ref: "#/components/schemas/SoulMintConversationFinalizeRequestTemplate"
        registration_preview:
          type: object
          additionalProperties: true

    SoulMintConversationFinalizeResponse:
      type: object
      additionalProperties: false
      required: [version, agent, published_version]
      properties:
        version:
          type: string
          enum: ["1"]
        agent:
          $ref: "#/components/schemas/SoulAgentIdentity"
        published_version:
          type: integer
          minimum: 1

paths:
  /api/v1/soul/agents/{agentId}/channels:
    get:
      operationId: soulGetAgentChannels
      summary: Get agent reachability channels (v3)
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{64}$"
      responses:
